basePath: /api
definitions:
  dto.ChangePasswordRequest:
    properties:
      new_password:
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.GetProfileResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_email_verified:
        type: boolean
      last_login_at:
        type: string
      locale:
        type: string
      preferences:
        type: object
      timezone:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.ResetPasswordRequest:
    properties:
      new_password:
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  dto.UpdateUserPreferencesRequest:
    properties:
      locale:
        maxLength: 10
        type: string
      preferences:
        type: object
      timezone:
        maxLength: 50
        type: string
    type: object
  dto.UpdateUserPreferencesResponse:
    properties:
      locale:
        type: string
      preferences:
        type: object
      timezone:
        type: string
      updated_at:
        type: string
    type: object
  dto.UpdateUserProfileRequest:
    properties:
      avatar_url:
        maxLength: 500
        type: string
      username:
        maxLength: 100
        type: string
    type: object
  dto.UpdateUserProfileResponse:
    properties:
      avatar_url:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  dto.VerifyEmailByTokenRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API server for Notree app.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Notree API
  version: "0.1"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset link to the provided email address. Always
        returns 200 OK to prevent email enumeration.
      parameters:
      - description: User email
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Example: {\"message\": \"password reset link has been sent\"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Request password reset
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user and returns access/refresh tokens in HttpOnly
        cookies
      parameters:
      - description: User credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            type: string
        "400":
          description: Invalid credentials
          schema:
            type: string
        "401":
          description: Invalid credentials
          schema:
            type: string
      summary: User login
      tags:
      - Auth
  /auth/logout:
    post:
      description: Deletes refresh token from database and clears cookies
      responses:
        "204":
          description: No Content
          schema:
            type: string
      summary: User logout
      tags:
      - Auth
  /auth/refresh-tokens:
    post:
      description: Takes refresh_token from cookie, deletes it, issues a new token
        pair and sets new cookies
      produces:
      - application/json
      responses:
        "200":
          description: Tokens refreshed successfully
          schema:
            type: string
        "401":
          description: Missing or invalid refresh token
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Refresh tokens
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user and returns access/refresh tokens in HttpOnly
        cookies
      parameters:
      - description: Data for registration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Success
          schema:
            type: string
        "400":
          description: Incorrect request format
          schema:
            type: string
        "409":
          description: User with that email already exists
          schema:
            type: string
      summary: User registration
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Sets a new password using the token received from the forgot-password
        email.
      parameters:
      - description: Reset token and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Example: {\"message\": \"password has been reset successfully\"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request (Invalid or expired token)
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Reset password with token
      tags:
      - Auth
  /profile/me:
    get:
      description: Returns the profile data of an authorized user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetProfileResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: User not found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get the current user's profile
      tags:
      - User
    patch:
      consumes:
      - application/json
      description: Updates the name and profile picture of the logged-in user
      parameters:
      - description: Information to update profile
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UpdateUserProfileResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update user profile
      tags:
      - User
  /profile/me/change-password:
    patch:
      consumes:
      - application/json
      description: Updates authenticated user's password. Requires old password for
        verification.
      parameters:
      - description: Old and new passwords
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Example: {\"message\": \"password updated\"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized (Missing or invalid token, or wrong old password)
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Change user password
      tags:
      - User
  /profile/me/preference:
    patch:
      consumes:
      - application/json
      description: Updates the locale, time zone, and user preferences
      parameters:
      - description: New user preferences
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserPreferencesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UpdateUserPreferencesResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update user preferences
      tags:
      - User
  /users/me/send-verification:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: 'Example: {\"message\": \"email verification link has been
            sent\"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Send email verification token
      tags:
      - User
  /users/me/verify-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyEmailByTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Example: {\"message\": \"email successfully verified\"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid or expired code
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Verify email with token
      tags:
      - User
securityDefinitions:
  BasicAuth:
    type: basic
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
