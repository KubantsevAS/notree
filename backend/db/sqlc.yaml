version: "2"
sql:
  - engine: "postgresql"
    queries: "../db/queries/auth.sql"
    schema: "../db/migrations/"
    gen:
      go:
        package: "auth"
        out: "../internal/db/auth"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false

  - engine: "postgresql"
    queries: "../db/queries/users.sql"
    schema: "../db/migrations/"
    gen:
      go:
        package: "user"
        out: "../internal/db/user"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false

  - engine: "postgresql"
    queries: "../db/queries/nodes.sql"
    schema: "../db/migrations/"
    gen:
      go:
        package: "node"
        out: "../internal/db/node"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
